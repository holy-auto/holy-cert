name: Render Ledra Video

on:
  push:
    branches:
      - claude/create-ledra-video-YinpF
    paths:
      - "remotion/**"
  workflow_dispatch:
    inputs:
      composition:
        description: "レンダリングする動画 ID"
        required: true
        default: "LedraIntro"
        type: choice
        options:
          - LedraIntro
          - AdminOnboarding
          - InsurerOnboarding
          - AgentOnboarding
          - CertificateDeepDive
          - WorkflowDeepDive
          - ALL

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Render — single video
        if: ${{ github.event_name == 'push' || inputs.composition != 'ALL' }}
        run: |
          COMP="${{ inputs.composition || 'LedraIntro' }}"
          mkdir -p out
          npx remotion render remotion/index.tsx "$COMP" "out/${COMP}.mp4" \
            --codec=h264 \
            --concurrency=2

      - name: Render — ALL videos
        if: ${{ inputs.composition == 'ALL' }}
        run: |
          mkdir -p out
          for COMP in LedraIntro AdminOnboarding InsurerOnboarding AgentOnboarding CertificateDeepDive WorkflowDeepDive; do
            echo "▶ Rendering $COMP ..."
            npx remotion render remotion/index.tsx "$COMP" "out/${COMP}.mp4" \
              --codec=h264 \
              --concurrency=2
          done

      - name: Upload MP4(s)
        uses: actions/upload-artifact@v4
        with:
          name: ledra-videos-${{ inputs.composition || 'LedraIntro' }}
          path: out/*.mp4
          retention-days: 30
