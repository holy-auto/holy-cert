name: Render Ledra Video

on:
  push:
    branches:
      - claude/create-ledra-video-YinpF
      - claude/fix-font-loading-timeout-exDjH
      - claude/fix-ledra-screenshot-KHIt2
    paths:
      - "remotion/**"
      - "scripts/capture-screenshots.ts"
      - "src/app/login/**"
      - "src/app/insurer/login/**"
      - "src/app/agent/login/**"
      - ".github/workflows/render-video.yml"
  workflow_dispatch:
    inputs:
      composition:
        description: "レンダリングする動画 ID"
        required: true
        default: "LedraIntro"
        type: choice
        options:
          - LedraIntro
          - AdminOnboarding
          - InsurerOnboarding
          - AgentOnboarding
          - CertificateDeepDive
          - WorkflowDeepDive
          - AdminFullGuide
          - InsurerFullGuide
          - AgentFullGuide
          - AdminOnboardingV2
          - InsurerOnboardingV2
          - AgentOnboardingV2
          - ALL
          - ALL_V2

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SECRET_ENCRYPTION_KEY:         ${{ secrets.SECRET_ENCRYPTION_KEY }}
      CUSTOMER_AUTH_PEPPER:          ${{ secrets.CUSTOMER_AUTH_PEPPER }}
      NEXT_PUBLIC_APP_URL:           ${{ secrets.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
      DEMO_ADMIN_EMAIL:              ${{ secrets.DEMO_ADMIN_EMAIL || 'demo@ledra-motors.example' }}
      DEMO_ADMIN_PASSWORD:           ${{ secrets.DEMO_ADMIN_PASSWORD || 'Demo1234!' }}
      DEMO_INSURER_EMAIL:            ${{ secrets.DEMO_INSURER_EMAIL }}
      DEMO_INSURER_PASSWORD:         ${{ secrets.DEMO_INSURER_PASSWORD }}
      DEMO_AGENT_EMAIL:              ${{ secrets.DEMO_AGENT_EMAIL }}
      DEMO_AGENT_PASSWORD:           ${{ secrets.DEMO_AGENT_PASSWORD }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Japanese fonts
        run: sudo apt-get install -y fonts-noto-cjk

      # ─── Screenshot capture (only for V2 compositions) ───────────────────
      - name: Resolve composition
        id: comp
        run: |
          # workflow_dispatch passes composition explicitly. push events get
          # LedraIntro by default, except on the screenshot-fix branch which
          # exercises the V2 capture path so the fix can actually be verified.
          INPUT="${{ inputs.composition }}"
          BRANCH="${{ github.ref_name }}"
          if [[ -n "$INPUT" ]]; then
            RESOLVED="$INPUT"
          elif [[ "$BRANCH" == "claude/fix-ledra-screenshot-KHIt2" ]]; then
            RESOLVED="AdminOnboardingV2"
          else
            RESOLVED="LedraIntro"
          fi
          echo "🎬 Composition: $RESOLVED (event=${{ github.event_name }} branch=$BRANCH input=$INPUT)"
          echo "resolved=$RESOLVED" >> $GITHUB_OUTPUT

      - name: Detect if screenshots are needed
        id: need_shots
        run: |
          COMP="${{ steps.comp.outputs.resolved }}"
          if [[ "$COMP" == *"V2"* ]] || [[ "$COMP" == "ALL_V2" ]] || [[ "$COMP" == "ALL" ]]; then
            echo "needed=true" >> $GITHUB_OUTPUT
          else
            echo "needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Seed demo tenant
        if: steps.need_shots.outputs.needed == 'true'
        run: |
          npm run demo:setup-tenant
          npm run demo:setup-tenant-user
          npm run demo:setup || true
          npm run demo:setup-insurer || true
        env:
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SECRET_ENCRYPTION_KEY:         ${{ secrets.SECRET_ENCRYPTION_KEY }}
          CUSTOMER_AUTH_PEPPER:          ${{ secrets.CUSTOMER_AUTH_PEPPER }}

      - name: Start Next.js dev server
        if: steps.need_shots.outputs.needed == 'true'
        run: |
          nohup npm run dev > /tmp/nextjs.log 2>&1 &
          echo "NEXTJS_PID=$!" >> $GITHUB_ENV

      - name: Wait for Next.js to be ready
        if: steps.need_shots.outputs.needed == 'true'
        run: |
          echo "Waiting for http://localhost:3000/login ..."
          for i in $(seq 1 90); do
            CODE=$(curl -s --max-time 5 -o /dev/null -w "%{http_code}" http://localhost:3000/login 2>/dev/null || echo "000")
            if [[ "$CODE" =~ ^[123] ]]; then
              echo "✅ Next.js ready (HTTP $CODE) after $((i * 2))s"
              sleep 3
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "❌ Next.js did not become ready within 180s. Server log:"
              tail -50 /tmp/nextjs.log
              exit 1
            fi
            sleep 2
          done

      - name: Install Playwright browsers
        if: steps.need_shots.outputs.needed == 'true'
        run: npx playwright install chromium --with-deps

      - name: Capture screenshots
        if: steps.need_shots.outputs.needed == 'true'
        run: npx tsx scripts/capture-screenshots.ts
        env:
          E2E_BASE_URL:          http://localhost:3000
          DEMO_ADMIN_EMAIL:      ${{ secrets.DEMO_ADMIN_EMAIL || 'demo@ledra-motors.example' }}
          DEMO_ADMIN_PASSWORD:   ${{ secrets.DEMO_ADMIN_PASSWORD || 'Demo1234!' }}
          DEMO_INSURER_EMAIL:    ${{ secrets.DEMO_INSURER_EMAIL }}
          DEMO_INSURER_PASSWORD: ${{ secrets.DEMO_INSURER_PASSWORD }}
          DEMO_AGENT_EMAIL:      ${{ secrets.DEMO_AGENT_EMAIL }}
          DEMO_AGENT_PASSWORD:   ${{ secrets.DEMO_AGENT_PASSWORD }}

      - name: Stop Next.js dev server
        if: steps.need_shots.outputs.needed == 'true' && always()
        run: |
          if [ -n "$NEXTJS_PID" ]; then kill "$NEXTJS_PID" 2>/dev/null || true; fi

      - name: Upload captured screenshots (debug)
        if: steps.need_shots.outputs.needed == 'true' && always()
        uses: actions/upload-artifact@v7
        with:
          name: ledra-screenshots-${{ steps.comp.outputs.resolved }}
          path: public/screenshots/**/*.png
          retention-days: 14
          if-no-files-found: warn

      # ─── Remotion render ─────────────────────────────────────────────────
      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Render — single video
        if: ${{ steps.comp.outputs.resolved != 'ALL' && steps.comp.outputs.resolved != 'ALL_V2' }}
        run: |
          COMP="${{ steps.comp.outputs.resolved }}"
          mkdir -p out
          npx remotion render remotion/index.tsx "$COMP" "out/${COMP}.mp4" \
            --codec=h264 \
            --concurrency=2

      - name: Render — ALL videos
        if: ${{ steps.comp.outputs.resolved == 'ALL' }}
        run: |
          mkdir -p out
          for COMP in LedraIntro AdminOnboarding InsurerOnboarding AgentOnboarding CertificateDeepDive WorkflowDeepDive AdminFullGuide InsurerFullGuide AgentFullGuide AdminOnboardingV2 InsurerOnboardingV2 AgentOnboardingV2; do
            echo "▶ Rendering $COMP ..."
            npx remotion render remotion/index.tsx "$COMP" "out/${COMP}.mp4" \
              --codec=h264 \
              --concurrency=2
          done

      - name: Render — ALL_V2 videos (screenshot-based)
        if: ${{ steps.comp.outputs.resolved == 'ALL_V2' }}
        run: |
          mkdir -p out
          for COMP in AdminOnboardingV2 InsurerOnboardingV2 AgentOnboardingV2; do
            echo "▶ Rendering $COMP ..."
            npx remotion render remotion/index.tsx "$COMP" "out/${COMP}.mp4" \
              --codec=h264 \
              --concurrency=2
          done

      - name: Upload MP4(s)
        uses: actions/upload-artifact@v7
        with:
          name: ledra-videos-${{ steps.comp.outputs.resolved }}
          path: out/*.mp4
          retention-days: 30
