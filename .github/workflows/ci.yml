name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  lint-typecheck-test:
    name: Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Security audit (production dependencies)
        # Fails CI when a high or critical CVE is surfaced in prod deps.
        # Moderate/low are tracked separately (see dependabot) and do not
        # block merges.
        run: npm audit --audit-level=high --omit=dev

      - name: Lint, Type Check & Unit Tests (parallel)
        run: |
          npm run lint &
          PID_LINT=$!
          npm run lint:migrations &
          PID_MIG=$!
          npx tsc --noEmit &
          PID_TSC=$!
          npm run test:coverage &
          PID_TEST=$!
          wait $PID_LINT || exit 1
          wait $PID_MIG || exit 1
          wait $PID_TSC || exit 1
          wait $PID_TEST || exit 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Cache Playwright Browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright Deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Cache Next.js Build
        uses: actions/cache@v5
        with:
          path: .next
          key: nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}-

      # E2E はビルド・起動が通ることを見たいだけなので、サードパーティ SDK
      # がモジュール top-level で要求する変数や、本番起動時に instrumentation
      # で env-validation が要求する変数には CI 専用の stub を渡す。
      # validateHighEntropy() は 32 文字以上 + "placeholder/test/dev" 等の
      # weak ワード単体ではない文字列を要求し、SECRET_ENCRYPTION_KEY は
      # base64 で 32 byte に decode できる必要がある。secret 値は E2E が
      # 実際に外部 API を叩かない限り中身は不要。
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub-ci-build.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'stub-ci-build-anon-key-not-used-in-e2e' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'stub-ci-build-service-role-key-40chars-padding-padding' }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY || 'sig_stub_ci_build_current' }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY || 'sig_stub_ci_build_next' }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN || 'stub-ci-build-qstash-token' }}

      - name: Start server & run E2E
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://stub-ci-build.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'stub-ci-build-anon-key-not-used-in-e2e' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'stub-ci-build-service-role-key-40chars-padding-padding' }}
          QSTASH_CURRENT_SIGNING_KEY: ${{ secrets.QSTASH_CURRENT_SIGNING_KEY || 'sig_stub_ci_build_current' }}
          QSTASH_NEXT_SIGNING_KEY: ${{ secrets.QSTASH_NEXT_SIGNING_KEY || 'sig_stub_ci_build_next' }}
          QSTASH_TOKEN: ${{ secrets.QSTASH_TOKEN || 'stub-ci-build-qstash-token' }}
          # --- env-validation requires (instrumentation hook) ---
          CRON_SECRET: ${{ secrets.CRON_SECRET || 'ci-stub-cron-secret-not-real-just-32-chars-padding' }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL || 'https://stub-ci.upstash.io' }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN || 'stub-ci-upstash-redis-token' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || 'whsec_stub_ci_build_webhook_secret' }}
          CUSTOMER_AUTH_PEPPER: ${{ secrets.CUSTOMER_AUTH_PEPPER || 'ci-stub-customer-auth-pepper-not-real-32-chars-padding' }}
          # base64 of 32 bytes (0xAB repeated) — passes AES-256-GCM key length check.
          SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY || 'q6urq6urq6urq6urq6urq6urq6urq6urq6urq6urq6s=' }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
