name: Security Scan

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  schedule:
    # Weekly Monday 04:00 UTC — surfaces new CVEs even on quiet repos.
    - cron: "0 4 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fail the job if any secret is found in the diff.
          GITLEAKS_ENABLE_COMMENTS: "true"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"

  dependency-review:
    name: Dependency review (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: Block PRs introducing high/critical CVEs or non-compliant licenses
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Block GPL / AGPL / SSPL whose copyleft is incompatible with our
          # closed-source SaaS distribution. MPL / LGPL は条件付きで許容するが
          # 個別レビューを希望するため allow リスト方式は採らない。
          deny-licenses: AGPL-3.0, AGPL-3.0-only, AGPL-3.0-or-later, GPL-3.0, GPL-3.0-only, GPL-3.0-or-later, SSPL-1.0
          comment-summary-in-pr: on-failure

  trivy:
    name: Trivy filesystem + SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # filesystem スキャン: package-lock.json / Dockerfile / .env.example
      # に紛れ込んだ脆弱性パッケージや認証情報パターンを SARIF 化して
      # GitHub Security タブに上げる。
      - name: Trivy filesystem scan (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-results.sarif

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs
